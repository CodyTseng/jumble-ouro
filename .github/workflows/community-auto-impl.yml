name: Community Auto-Implementation

# Daily job that picks the top-voted community feature request and asks
# the AI coding agent to implement it. See CONTRIBUTING.md for the full flow.
#
# The workflow is split into four stages so that a failure in validation
# or merge does not force the agent to re-run from scratch. If validation
# fails, re-run the failed job only from the Actions UI.
#
#   1. implement  — select issue, agent synth + implement, push, open PR
#   2. validate   — parallel matrix: lint, typecheck, build, test
#   3. merge      — synchronous squash merge + close the loop on the issue
#   4. on-failure — runs on any upstream failure, labels issue ai-failed

on:
  schedule:
    # 20:00 UTC every day. Adjust as you like.
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Force-process this issue number (bypasses score threshold)"
        required: false
        type: string

concurrency:
  group: community-auto-impl
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ====================================================================
  # Job 1: implement
  # Runs the expensive work: agent synth + implement, push, open PR.
  # Exposes outputs consumed by all downstream jobs.
  # ====================================================================
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      skip: ${{ steps.select.outputs.skip }}
      mode: ${{ steps.select.outputs.mode }}
      issue_number: ${{ steps.self_issue.outputs.issue_number || steps.select.outputs.issue_number }}
      issue_title: ${{ steps.self_issue.outputs.issue_title || steps.select.outputs.issue_title }}
      issue_kind: ${{ steps.self_issue.outputs.kind || steps.select.outputs.kind }}
      branch: ${{ steps.branch.outputs.name }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            codeload.github.com:443
            uploads.github.com:443
            raw.githubusercontent.com:443
            user-images.githubusercontent.com:443
            private-user-images.githubusercontent.com:443
            gist.github.com:443
            gist.githubusercontent.com:443
            registry.npmjs.org:443
            www.npmjs.com:443
            api.anthropic.com:443
            statsig.anthropic.com:443
            claude.ai:443
            developer.mozilla.org:443
            react.dev:443
            vitejs.dev:443
            tailwindcss.com:443
            www.typescriptlang.org:443
            nostr-nips.com:443
            nips.nostr.com:443

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ------------------------------------------------------------------
      # Pick the eligible top-voted issue (or the one forced via
      # workflow_dispatch), fetch its full discussion + images, and
      # write .ai-spec-raw.md + .ai-images/ for the agent to consume.
      # ------------------------------------------------------------------
      - name: Select issue and build raw spec
        id: select
        uses: actions/github-script@v7
        env:
          FORCED_ISSUE: ${{ github.event.inputs.issue_number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const OWNER = context.repo.owner;
            const REPO = context.repo.repo;
            const MIN_SCORE = 5;
            const EXCLUDE_LABELS = new Set([
              'ai-in-progress',
              'ai-implemented',
              'ai-failed',
              'needs-discussion',
              'wontfix',
            ]);
            const IMAGE_HOST_ALLOWLIST = [
              'user-images.githubusercontent.com',
              'github.com', // /user-attachments/assets/...
              'raw.githubusercontent.com',
              'private-user-images.githubusercontent.com',
            ];
            const MAX_IMAGE_BYTES = 5 * 1024 * 1024;

            const forced = (process.env.FORCED_ISSUE || '').trim();

            // Map a label set to our internal kind. Returns null if neither
            // label is present (used to skip forced issues that aren't a
            // feature/bug, and to defensively filter the listing).
            const kindFromLabels = (labels) => {
              const names = (labels || []).map((l) => (typeof l === 'string' ? l : l.name));
              if (names.includes('feature-request')) return 'feature';
              if (names.includes('bug')) return 'bug';
              return null;
            };

            // ---- pick issue ----
            let chosen = null;
            let chosenKind = null;
            if (forced) {
              core.info(`Forced issue via workflow_dispatch: #${forced}`);
              const { data } = await github.rest.issues.get({
                owner: OWNER, repo: REPO, issue_number: Number(forced),
              });
              if (data.state !== 'open') {
                core.setOutput('skip', 'true');
                core.warning(`Issue #${forced} is not open — skipping.`);
                return;
              }
              chosenKind = kindFromLabels(data.labels);
              if (!chosenKind) {
                core.setOutput('skip', 'true');
                core.warning(`Issue #${forced} has neither 'feature-request' nor 'bug' label — skipping.`);
                return;
              }
              chosen = data;
            } else {
              // GitHub's `labels` filter is AND-semantics, so fetch each kind
              // separately and merge into a single scored pool.
              const fetchByLabel = (label) => github.paginate(github.rest.issues.listForRepo, {
                owner: OWNER, repo: REPO,
                state: 'open',
                labels: label,
                per_page: 100,
              });
              const [features, bugs] = await Promise.all([
                fetchByLabel('feature-request'),
                fetchByLabel('bug'),
              ]);
              const seen = new Set();
              const pool = [];
              for (const i of [...features, ...bugs]) {
                if (i.pull_request) continue;
                if (seen.has(i.number)) continue;
                seen.add(i.number);
                const kind = kindFromLabels(i.labels);
                if (!kind) continue;
                if ((i.labels || []).some((l) => {
                  const name = typeof l === 'string' ? l : l.name;
                  return EXCLUDE_LABELS.has(name);
                })) continue;
                pool.push({ issue: i, kind });
              }
              const scored = pool
                .map((p) => ({
                  ...p,
                  score: (p.issue.reactions?.['+1'] || 0) - (p.issue.reactions?.['-1'] || 0),
                }))
                .sort((a, b) => b.score - a.score);

              if (scored.length === 0 || scored[0].score < MIN_SCORE) {
                core.info(`No eligible issue: top score = ${scored[0]?.score ?? 0}, need ≥ ${MIN_SCORE}. Entering self-evolution mode.`);
                core.setOutput('skip', 'false');
                core.setOutput('mode', 'self-evolution');
                return;
              }
              chosen = scored[0].issue;
              chosenKind = scored[0].kind;
              core.info(`Picked #${chosen.number} "${chosen.title}" (${chosenKind}) with score ${scored[0].score}`);
            }

            const issueNumber = chosen.number;
            core.setOutput('mode', 'community');
            const score = (chosen.reactions?.['+1'] || 0) - (chosen.reactions?.['-1'] || 0);

            // ---- fetch all comments ----
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: OWNER, repo: REPO, issue_number: issueNumber, per_page: 100,
            });

            // ---- compose raw spec markdown ----
            const lines = [];
            lines.push(`# Issue #${issueNumber}: ${chosen.title}`);
            lines.push('');
            lines.push(`- Author: @${chosen.user?.login ?? 'unknown'}`);
            lines.push(`- Created: ${chosen.created_at}`);
            lines.push(`- Net score (👍 − 👎): ${score}`);
            lines.push(`- URL: ${chosen.html_url}`);
            lines.push('');
            lines.push('## Original body');
            lines.push('');
            lines.push(chosen.body || '_(empty)_');
            lines.push('');
            if (comments.length > 0) {
              lines.push(`## Discussion (${comments.length} comment${comments.length === 1 ? '' : 's'})`);
              lines.push('');
              for (const c of comments) {
                lines.push(`### @${c.user?.login ?? 'unknown'} — ${c.created_at}`);
                lines.push('');
                lines.push(c.body || '_(empty)_');
                lines.push('');
              }
            } else {
              lines.push('## Discussion');
              lines.push('');
              lines.push('_No comments yet._');
              lines.push('');
            }
            let raw = lines.join('\n');

            // ---- extract + download images ----
            fs.mkdirSync('.ai-images', { recursive: true });
            const mdImg = /!\[[^\]]*\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g;
            const htmlImg = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
            const urls = new Set();
            for (const m of raw.matchAll(mdImg)) urls.add(m[1]);
            for (const m of raw.matchAll(htmlImg)) urls.add(m[1]);

            let idx = 0;
            for (const url of urls) {
              idx += 1;
              let host;
              try { host = new URL(url).host; } catch { host = null; }
              if (!host || !IMAGE_HOST_ALLOWLIST.includes(host)) {
                raw = raw.split(url).join(`${url} [image not fetched: host not allowlisted]`);
                continue;
              }
              try {
                const res = await fetch(url, { redirect: 'follow' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const buf = Buffer.from(await res.arrayBuffer());
                if (buf.length > MAX_IMAGE_BYTES) {
                  raw = raw.split(url).join(`${url} [image too large, skipped]`);
                  continue;
                }
                const ct = res.headers.get('content-type') || '';
                const ext = ct.includes('png') ? 'png'
                  : ct.includes('jpeg') || ct.includes('jpg') ? 'jpg'
                  : ct.includes('gif') ? 'gif'
                  : ct.includes('webp') ? 'webp'
                  : (path.extname(new URL(url).pathname) || '.bin').slice(1) || 'bin';
                const local = `.ai-images/${idx}.${ext}`;
                fs.writeFileSync(local, buf);
                raw = raw.split(url).join(local);
                core.info(`Downloaded ${url} -> ${local} (${buf.length} bytes)`);
              } catch (err) {
                raw = raw.split(url).join(`${url} [image fetch failed: ${err.message}]`);
              }
            }

            fs.writeFileSync('.ai-spec-raw.md', raw);

            core.setOutput('skip', 'false');
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('issue_title', chosen.title);
            core.setOutput('score', String(score));
            core.setOutput('kind', chosenKind);

      - name: Short-circuit if nothing to do
        if: steps.select.outputs.skip == 'true'
        run: |
          echo "No eligible issue today. Exiting cleanly."
          exit 0

      # ------------------------------------------------------------------
      # Self-evolution path: when no community issue meets the threshold,
      # the agent autonomously explores the codebase and proposes a small
      # improvement. The steps below produce the same outputs as the
      # community path so that validate/merge/on-failure work unchanged.
      # ------------------------------------------------------------------
      - name: Fetch existing issues for dedup
        if: steps.select.outputs.mode == 'self-evolution'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const OWNER = context.repo.owner;
            const REPO = context.repo.repo;

            // Fetch all open issues (any label) to avoid duplicating community requests
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: OWNER, repo: REPO,
              state: 'open',
              per_page: 100,
            });

            // Fetch recently closed ai-self-proposed issues to know what was already done
            const closedSelfProposed = await github.paginate(github.rest.issues.listForRepo, {
              owner: OWNER, repo: REPO,
              state: 'closed',
              labels: 'ai-self-proposed',
              per_page: 30,
              sort: 'created',
              direction: 'desc',
            });

            const lines = ['# Existing Issues\n'];
            lines.push('Do NOT propose anything that overlaps with these existing issues.\n');

            lines.push('## Open Issues\n');
            for (const issue of openIssues) {
              if (issue.pull_request) continue;
              const labels = (issue.labels || []).map(l => typeof l === 'string' ? l : l.name).join(', ');
              const snippet = (issue.body || '').slice(0, 200).replace(/\n/g, ' ');
              lines.push(`- #${issue.number} [${labels}]: ${issue.title}`);
              lines.push(`  ${snippet}\n`);
            }

            lines.push('\n## Recently Closed Self-Proposed Issues\n');
            lines.push('These were previously proposed by the AI agent. Do not repeat them.\n');
            for (const issue of closedSelfProposed) {
              const snippet = (issue.body || '').slice(0, 200).replace(/\n/g, ' ');
              lines.push(`- #${issue.number}: ${issue.title}`);
              lines.push(`  ${snippet}\n`);
            }

            fs.writeFileSync('.ai-existing-issues.md', lines.join('\n'));
            core.info(`Wrote .ai-existing-issues.md with ${openIssues.length} open + ${closedSelfProposed.length} closed self-proposed issues`);

      # ------------------------------------------------------------------
      # Self-evolution: the agent explores the codebase and proposes a
      # small improvement, then writes .ai-spec-final.md just like Phase A.
      # ------------------------------------------------------------------
      - name: Self-evolution agent — explore and propose
        if: steps.select.outputs.mode == 'self-evolution'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --allowedTools Read,Write,Glob,Grep,WebFetch,WebSearch
          prompt: |
            You are an autonomous improvement agent for Jumble Ouro, a community-driven
            Nostr client. No community feature request met the voting threshold today, so
            you have the opportunity to propose and implement a small improvement on your own.

            Your north star: make Jumble a better Nostr client — responsive, decentralized,
            user-friendly, and with a clean, unified UI. Think about what would attract new
            users and keep existing ones coming back.

            ## Step 1: Understand the project
            Read CLAUDE.md for project conventions and architecture.

            ## Step 2: Review existing issues
            Read `.ai-existing-issues.md` — it lists every open issue in the repo (community
            feature requests, bug reports, and past AI self-proposed issues) plus recently
            closed self-proposed issues. You MUST NOT propose anything that overlaps with or
            duplicates any of these.

            ## Step 3: Explore the codebase
            Browse the source code freely with Glob, Grep, and Read. Look for opportunities
            in two broad categories:

            **A. Features that attract and retain users** (high priority):
            - Interactions or features that make users think "this client is cool / unique"
            - Better social discovery (finding interesting people, content, or relays)
            - Leveraging Nostr's decentralized nature for a differentiated experience
            - Reducing friction for new users (onboarding, first-time experience)
            - Creative use of existing Nostr NIPs that other clients don't do well
            - Small delightful touches (animations, micro-interactions, smart defaults)

            **B. Polishing the existing experience**:
            - Real bugs (something visually broken, logically wrong, or crashes)
            - UX polish (missing loading/error/empty states, poor mobile experience)
            - Accessibility gaps (missing aria labels, keyboard navigation)
            - Small enhancements aligned with already-supported NIPs

            You may also use WebSearch to research what features popular Nostr clients
            (Damus, Primal, Amethyst, Snort, Coracle) offer, or what NIPs could inspire
            small improvements. Use WebFetch to read any relevant NIP specs if needed.

            ## Step 4: Choose ONE improvement
            Pick a single, small, concrete improvement. It must be:
            - Achievable in under ~300 lines of source code changes (i18n doesn't count)
            - Self-contained — no multi-PR dependency chains
            - NOT something from `.ai-existing-issues.md`
            - NOT a change to `.github/**`, secrets, or key/signing infrastructure
            - NOT a vague refactor — it must have clear user-facing or developer-facing impact
            - Concrete and actionable ("add loading skeleton to RelayPage feed" is good,
              "improve performance" is bad)

            ## Step 5: Write the spec
            Write `.ai-spec-final.md` using the appropriate template:

            For a **feature/improvement**:

                # <title>
                ## Goal
                ## Rationale
                ## Acceptance criteria
                ## Out of scope
                ## Implementation notes

            For a **bug fix**:

                # <title>
                ## Summary of the bug
                ## Reproduction steps
                ## Root cause hypothesis
                ## Fix approach
                ## Acceptance criteria
                ## Regression risk
                ## Out of scope

            ## Step 6: Write the proposal summary
            Write `.ai-self-proposal.md` with exactly this format:

                # <title>
                Category: <bug|feature|polish|accessibility>

                <2-3 sentence summary of what the improvement is and why it matters>

            If you truly cannot find any meaningful improvement after thorough exploration
            (unlikely), write `.ai-abort` with the reason and STOP.

            In this phase you may ONLY write `.ai-spec-final.md`, `.ai-self-proposal.md`,
            or `.ai-abort`. Do not touch `src/**` or any other project files.

      - name: Abort if self-evolution agent flagged
        if: steps.select.outputs.mode == 'self-evolution'
        run: |
          if [ -f .ai-abort ]; then
            echo "Self-evolution agent aborted:"
            cat .ai-abort
            exit 1
          fi
          if [ ! -f .ai-spec-final.md ]; then
            echo "Self-evolution agent did not produce .ai-spec-final.md"
            exit 1
          fi
          if [ ! -f .ai-self-proposal.md ]; then
            echo "Self-evolution agent did not produce .ai-self-proposal.md"
            exit 1
          fi
          echo "Self-evolution spec:"
          cat .ai-spec-final.md

      - name: Create self-proposed issue
        id: self_issue
        if: steps.select.outputs.mode == 'self-evolution'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const proposal = fs.readFileSync('.ai-self-proposal.md', 'utf8');
            const spec = fs.readFileSync('.ai-spec-final.md', 'utf8');

            // Extract title from proposal (first # heading)
            const titleMatch = proposal.match(/^#\s+(.+)/m);
            const title = titleMatch ? titleMatch[1].trim() : 'AI self-proposed improvement';

            // Extract category
            const catMatch = proposal.match(/^Category:\s*(.+)/mi);
            const category = catMatch ? catMatch[1].trim() : 'feature';

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: [
                '🤖 **Auto-proposed by the AI agent** (self-evolution mode)',
                '',
                proposal.replace(/^#\s+.+\n/, '').trim(),
                '',
                '---',
                '',
                '<details><summary>Full spec</summary>',
                '',
                spec,
                '',
                '</details>',
                '',
                `_This issue was created automatically because no community request met the voting threshold today. The agent identified this improvement autonomously. Follow progress in the [Actions tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})._`,
              ].join('\n'),
              labels: ['ai-self-proposed', 'ai-in-progress'],
            });

            const kind = category === 'bug' ? 'bug' : 'feature';
            core.setOutput('issue_number', String(issue.number));
            core.setOutput('issue_title', title);
            core.setOutput('kind', kind);
            core.info(`Created self-proposed issue #${issue.number}: ${title} (${kind})`);

      - name: Mark issue in-progress
        if: steps.select.outputs.skip != 'true' && steps.select.outputs.mode == 'community'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
          SCORE: ${{ steps.select.outputs.score }}
        with:
          script: |
            const n = Number(process.env.ISSUE_NUMBER);
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: n, labels: ['ai-in-progress'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: n,
              body: `🤖 The AI agent is starting work on this request (net score: ${process.env.SCORE}).\n\nYou can follow progress in the [Actions tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}). A pull request will be opened automatically when ready.`,
            });

      - name: Create working branch
        id: branch
        if: steps.select.outputs.skip != 'true'
        env:
          ISSUE_NUMBER: ${{ steps.self_issue.outputs.issue_number || steps.select.outputs.issue_number }}
          MODE: ${{ steps.select.outputs.mode }}
        run: |
          git config user.name "jumble-ai-bot"
          git config user.email "jumble-ai-bot@users.noreply.github.com"
          if [ "$MODE" = "self-evolution" ]; then
            BRANCH="ai/self-${ISSUE_NUMBER}"
          else
            BRANCH="ai/issue-${ISSUE_NUMBER}"
          fi
          git checkout -B "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.select.outputs.skip != 'true'
        run: npm ci

      # ------------------------------------------------------------------
      # Phase A — the agent reads the full thread (including images) and
      # produces .ai-spec-final.md. No source edits allowed here.
      # ------------------------------------------------------------------
      - name: Agent phase A — synthesize spec
        if: steps.select.outputs.skip != 'true' && steps.select.outputs.mode == 'community'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools Read,Write,Glob,Grep,WebFetch
          prompt: |
            You are preparing a spec for a community issue on the Jumble Ouro Nostr client.

            Read `.ai-spec-raw.md` — it contains the original issue body and every comment in
            chronological order, with authors and timestamps. Image attachments referenced in
            the thread have been pre-downloaded to `.ai-images/` and the markdown rewritten to
            point at local paths. You MUST open every local image path with the Read tool to
            actually see the screenshots — they often carry load-bearing context (mockups,
            error screenshots, before/after comparisons, repro recordings).

            If the thread links to URLs that are clearly load-bearing for understanding the
            request (related GitHub issues / PRs / commits / files, gists, NIPs, framework
            docs), use WebFetch to read them. Don't fetch every link — only the ones the
            discussion actually depends on. The runner has an egress allowlist, so unusual
            hosts may be blocked; that's expected, just move on if a fetch fails.

            Your task:
            1. Read the ENTIRE thread, including every referenced image. Discussion often
               contains the real requirements — clarifications, agreed scope reductions,
               rejected approaches, edge cases, and reproduction details that are not in
               the opening post.
            2. Decide whether the issue is best handled as a **feature** (the user wants new
               behavior the app does not yet have) or a **bug fix** (something already exists
               and is broken or behaves wrong). The GitHub label is a hint, not authoritative
               — users mislabel sometimes. Trust what the thread actually describes.
            3. If the thread shows unresolved disagreement on core scope, or the request is
               still ambiguous after reading all comments, write `.ai-abort` with a short
               reason ("unresolved discussion: <what>") and STOP. For bugs, also abort if
               there is no plausible reproduction or root cause signal at all.
            4. Otherwise, write a consolidated spec to `.ai-spec-final.md` using exactly ONE
               of the two templates below. Do not mix them.

               For a **feature**:

                   # <refined title>
                   ## Goal
                   ## Rationale
                   ## Acceptance criteria
                   ## Out of scope
                   ## Open questions resolved in thread

               For a **bug fix**:

                   # <refined title>
                   ## Summary of the bug
                   ## Reproduction steps
                   ## Root cause hypothesis
                   ## Fix approach
                   ## Acceptance criteria
                   ## Regression risk
                   ## Out of scope

               If you chose a template that disagrees with the GitHub label (e.g. the issue
               was labeled `bug` but you concluded it's actually a feature request), add a
               one-line note immediately after the title: `> Note: handled as <feature|bug
               fix> despite the \`<label>\` label, because <reason>.`

               Base every section on what the thread actually says. Do not invent requirements
               or root causes that were never discussed — for a bug, a hypothesis grounded in
               the code you'll inspect later is fine, but flag it as a hypothesis.

            In this phase you may ONLY write `.ai-spec-final.md` or `.ai-abort`. Do not touch
            `src/**` or any other project files. Do not run git commands.

      - name: Abort if the agent flagged the request
        if: steps.select.outputs.skip != 'true' && steps.select.outputs.mode == 'community'
        run: |
          if [ -f .ai-abort ]; then
            echo "Agent aborted (phase A):"
            cat .ai-abort
            exit 1
          fi
          if [ ! -f .ai-spec-final.md ]; then
            echo "Phase A did not produce .ai-spec-final.md"
            exit 1
          fi
          echo "Synthesized spec:"
          cat .ai-spec-final.md

      # ------------------------------------------------------------------
      # Phase B — the agent implements the feature against the final spec.
      # ------------------------------------------------------------------
      - name: Agent phase B — implement
        if: steps.select.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --allowedTools Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch
          prompt: |
            You are implementing a community issue for the Jumble Ouro Nostr client.

            Read CLAUDE.md first for project conventions.

            The authoritative requirement is `.ai-spec-final.md` — a spec synthesized from the
            full GitHub issue discussion. Treat it as the single source of truth. The raw issue
            and comments are also available in `.ai-spec-raw.md` for reference only; if the
            two disagree, the final spec wins.

            The spec's section structure tells you whether this is a feature or a bug fix.
            For a bug fix, prefer the smallest correct change that resolves the root cause —
            avoid drive-by refactors in adjacent code, and call out in the commit message any
            place where you suspected the same bug class might exist elsewhere but chose not
            to touch.

            ================================================================
            INTERNATIONALIZATION — MANDATORY, NOT OPTIONAL
            ================================================================
            Jumble is a multi-language app. For EVERY new user-facing string you add
            (labels, buttons, tooltips, placeholders, toast messages, error messages,
            empty states, menu items, headings — literally any text a user will read):

            1. NEVER hardcode English (or any natural language) text in a component.
               Always route it through `t('your.key')` via `useTranslation` from
               `react-i18next`.

            2. Add the new key to `src/i18n/locales/en.ts` — APPENDED TO THE END of
               the file. Never insert keys in the middle, never reorder, never
               modify existing keys.

            3. Add the SAME key to every other locale file under `src/i18n/locales/`:
               ar, de, es, fa, fr, hi, hu, it, ja, ko, pl, pt-BR, pt-PT, ru, th,
               zh, zh-TW. Again, appended to the end.

               Translate each one to your best ability. Imperfect translations can
               be improved later by human contributors; missing translations cannot.
               Use surrounding entries in each file as a style/tone reference.
               Do not leave any locale file with only the English fallback.

            4. If the spec adds more than ~10 new strings and translating them all
               would balloon the change, STILL translate them all — i18n coverage
               is more important than commit size. Split into multiple commits if
               helpful.

            Failing to internationalize a new string is treated as a lint failure
            and the downstream validate job will block the PR.

            ================================================================
            HARD CONSTRAINTS — must not violate
            ================================================================
            - Do NOT modify anything under `.github/**` (CI workflows, issue templates, action configs).
              This protects the automation itself from self-modification.
            - Do NOT edit `package-lock.json` by hand — if deps change, run `npm install` and let npm update it.
            - Do NOT add or rotate any secrets, env var defaults, or files named like `*.key`, `*.pem`, `.env*`.
            - Do NOT commit `.ai-spec-raw.md`, `.ai-spec-final.md`, `.ai-self-proposal.md`, `.ai-existing-issues.md`, `.ai-images/`, or `.ai-abort` — they are audit artifacts.

            ================================================================
            SOFT GUIDANCE — prefer, but may deviate with justification
            ================================================================
            - Prefer minimal, scoped changes. If adding a new npm dependency, justify it in the commit message
              and prefer well-maintained packages.
            - When touching `src/services/` (especially client/signing/key-related code), be extra careful
              — these handle user keys and relay I/O. Small surface-area edits are fine; large rewrites should abort.
            - If the request is ambiguous, would require >500 LOC of source code (i18n locale additions do NOT
              count toward this budget), or touches security-sensitive signing paths in a non-trivial way,
              STOP and write a file `.ai-abort` with the reason — do not attempt.
            - Commit in logical chunks with clear messages using git from the Bash tool.

            ================================================================
            VALIDATION — must all pass before you stop
            ================================================================
              npm run lint
              npx tsc --noEmit
              npm run build
              npm run test

            When done, the working tree should be clean except for your committed changes on the current branch.

      - name: Abort if the agent flagged implementation
        if: steps.select.outputs.skip != 'true'
        run: |
          if [ -f .ai-abort ]; then
            echo "Agent aborted (phase B):"
            cat .ai-abort
            exit 1
          fi

      # ------------------------------------------------------------------
      # Ensure the agent actually committed something and that no audit
      # artifacts leaked into the commit history.
      # ------------------------------------------------------------------
      - name: Verify commits and scrub artifacts
        if: steps.select.outputs.skip != 'true'
        run: |
          set -e
          COMMITS=$(git rev-list --count origin/${{ github.event.repository.default_branch }}..HEAD)
          if [ "$COMMITS" = "0" ]; then
            echo "The agent made no commits on the branch."
            exit 1
          fi
          if git log origin/${{ github.event.repository.default_branch }}..HEAD --name-only --pretty=format: \
             | grep -E '^(\.ai-spec-raw\.md|\.ai-spec-final\.md|\.ai-abort|\.ai-self-proposal\.md|\.ai-existing-issues\.md|\.ai-images/)' ; then
            echo "Audit artifacts leaked into commits — failing."
            exit 1
          fi

      # ------------------------------------------------------------------
      # Hard denylist: refuse to push if the agent touched CI configs,
      # secrets, or env files. Enforces the soft prompt constraints at the
      # CI level so a prompt-injected agent cannot silently self-modify the
      # automation or exfiltrate credentials via commit.
      # ------------------------------------------------------------------
      - name: Reject sensitive path changes
        if: steps.select.outputs.skip != 'true'
        run: |
          set -e
          FORBIDDEN=$(git diff --name-only \
              "origin/${{ github.event.repository.default_branch }}...HEAD" \
            | grep -E '^\.github/|\.key$|\.pem$|(^|/)\.env(\.|$)' \
            || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "The agent touched forbidden paths:"
            echo "$FORBIDDEN"
            echo
            echo "Refusing to push. These paths are off-limits for the automation:"
            echo "  - .github/**           (self-modification of CI)"
            echo "  - *.key / *.pem        (private keys)"
            echo "  - .env*                (environment / secrets)"
            exit 1
          fi
          echo "No sensitive paths touched — OK to push."

      - name: Push branch
        if: steps.select.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$BRANCH"

      - name: Open PR
        if: steps.select.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.self_issue.outputs.issue_number || steps.select.outputs.issue_number }}
          MODE: ${{ steps.select.outputs.mode }}
          BASE: ${{ github.event.repository.default_branch }}
        run: |
          set -e
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base "$BASE" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already open for $BRANCH — updated by force-push, skipping create."
            exit 0
          fi
          REFINED_TITLE=$(awk '/^# /{sub(/^# */,""); print; exit}' .ai-spec-final.md)
          if [ -z "$REFINED_TITLE" ]; then
            REFINED_TITLE="${{ steps.self_issue.outputs.issue_title || steps.select.outputs.issue_title }}"
          fi
          KIND="${{ steps.self_issue.outputs.kind || steps.select.outputs.kind }}"
          LABEL_ARGS=(--label ai-generated)
          if [ "$MODE" = "self-evolution" ]; then
            LABEL_ARGS+=(--label ai-self-proposed)
          fi
          if [ "$KIND" = "bug" ]; then
            PR_TITLE="fix: ${REFINED_TITLE} (#${ISSUE_NUMBER})"
            LABEL_ARGS+=(--label bug)
          else
            PR_TITLE="${REFINED_TITLE} (#${ISSUE_NUMBER})"
          fi
          if [ "$MODE" = "self-evolution" ]; then
            {
              echo "Closes #${ISSUE_NUMBER}"
              echo
              echo "🤖 Auto-implemented by an AI coding agent (self-evolution mode)."
              echo
              echo "## Spec"
              echo
              cat .ai-spec-final.md
            } > .ai-pr-body.md
          else
            {
              echo "Closes #${ISSUE_NUMBER}"
              echo
              echo "🤖 Auto-implemented by an AI coding agent from a community request."
              echo
              echo "## Synthesized spec"
              echo
              cat .ai-spec-final.md
            } > .ai-pr-body.md
          fi
          gh pr create \
            --title "$PR_TITLE" \
            --body-file .ai-pr-body.md \
            "${LABEL_ARGS[@]}" \
            --base "$BASE" \
            --head "$BRANCH"

      - name: Post synthesized spec to issue
        if: steps.select.outputs.skip != 'true' && steps.select.outputs.mode == 'community'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.select.outputs.issue_number }}
        with:
          script: |
            const fs = require('fs');
            const n = Number(process.env.ISSUE_NUMBER);
            const spec = fs.readFileSync('.ai-spec-final.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: n,
              body: `✅ The AI agent has opened a pull request implementing this request. It will be merged once lint, typecheck, build, and test all pass.\n\n<details><summary>Synthesized spec used for implementation</summary>\n\n${spec}\n\n</details>`,
            });

      - name: Upload audit artifacts
        if: always() && steps.select.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-audit-${{ steps.self_issue.outputs.issue_number || steps.select.outputs.issue_number }}
          path: |
            .ai-spec-raw.md
            .ai-spec-final.md
            .ai-self-proposal.md
            .ai-existing-issues.md
            .ai-abort
            .ai-images/
          if-no-files-found: ignore
          retention-days: 30

      - name: Push failed branch for human inspection
        if: failure() && steps.select.outputs.skip != 'true' && env.BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$BRANCH" || true

  # ====================================================================
  # Job 2: validate
  # Parallel matrix. Each check re-runs independently if failed, so a
  # bad lint does not force the agent to re-run phase B.
  # ====================================================================
  validate:
    needs: implement
    if: needs.implement.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: npm run lint
          - name: Typecheck
            command: npx tsc --noEmit
          - name: Build
            command: npm run build
          - name: Test
            command: npm run test
    name: validate / ${{ matrix.name }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443

      - name: Checkout AI branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.implement.outputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  # ====================================================================
  # Job 3: merge
  # Synchronous squash merge (no --auto). Requires no branch protection.
  # ====================================================================
  merge:
    needs: [implement, validate]
    if: needs.implement.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - name: Merge PR and relabel issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ needs.implement.outputs.branch }}
          ISSUE_NUMBER: ${{ needs.implement.outputs.issue_number }}
        run: |
          set -e
          gh pr merge "$BRANCH" --repo "$REPO" --squash --delete-branch
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label ai-in-progress --add-label ai-implemented || true

  # ====================================================================
  # Job 4: on-failure
  # Catches failures from implement / validate / merge and flips the
  # issue to ai-failed with a pointer to the failing run.
  # ====================================================================
  on-failure:
    needs: [implement, validate, merge]
    if: |
      always()
      && needs.implement.outputs.skip != 'true'
      && needs.implement.outputs.issue_number != ''
      && (needs.implement.result == 'failure'
          || needs.validate.result == 'failure'
          || needs.merge.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Mark issue failed
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ needs.implement.outputs.issue_number }}
          FAILED_STAGE: >-
            ${{ needs.implement.result == 'failure' && 'implement'
                || needs.validate.result == 'failure' && 'validate'
                || 'merge' }}
        with:
          script: |
            const n = Number(process.env.ISSUE_NUMBER);
            const stage = process.env.FAILED_STAGE;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: n,
              body: `❌ Auto-implementation failed at the **${stage}** stage. See [the run log](${runUrl}) for details. A human maintainer will take a look.\n\nYou can also re-run only the failed job from the Actions UI if the fix is trivial (e.g., a flaky test).`,
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: n, name: 'ai-in-progress',
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: n, labels: ['ai-failed'],
            });
